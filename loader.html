<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>迷你辅助合集售卖平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:#f5f5f5}
iframe{width:100%;height:100%;border:none}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#666;font-size:16px}
.loading .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top:4px solid #007aff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading" id="loading">
<div class="spinner"></div>
<div>正在加载...如果长时间无反应，请尝试直接访问原始页面</div>
</div>
<iframe id="mainFrame" style="display:none" src="https://cdn.jsdelivr.net/gh/qmlc-1147/mall-shop@main/index.html" onload="document.getElementById('loading').style.display='none';this.style.display='block'"></iframe>
<script>
// 备用方案：如果iframe加载失败，直接跳转到jsDelivr
setTimeout(function(){
  var frame = document.getElementById('mainFrame');
  if(frame.style.display==='none'){
    window.location.href = 'https://cdn.jsdelivr.net/gh/qmlc-1147/mall-shop@main/index.html';
  }
}, 8000);
</script>
</body>
</html>
